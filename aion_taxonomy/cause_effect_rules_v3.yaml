  confidence: 0.86
  source: Moneycontrol (Mar 2026); StarAgri (Feb 2026); GSN News (Aug 2025)
  evidence: Cold storage market $12B → $20B by 2029; 30% fruit/veg lost post-harvest;
    storage prices rose 2% early
- id: export_ban_competitor_gain
  condition:
    policy_action:
    - export ban
    - export restriction
    - minimum export price
    - export duty
    commodity:
    - wheat
    - rice
    - sugar
    - onion
    - cotton
  propagation:
  - sector: Agriculture & Allied
    impact: -0.4
    lag_days: 90
