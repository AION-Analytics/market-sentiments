  - sector: IT
    impact: -0.1
    lag_days: 365
    rationale: Reduced state development spending; capex diverted to relief; long-term
      growth drag
  confidence: 0.9
  source: IIT Bombay study (Jan 2025); BW Businessworld (Jan 2026); The Tribune (Sep
    2025)
  evidence: 'Uttarakhand: ~8% revenue to disaster relief; Punjab: ₹12,905 cr flood
    losses; states seek Finance Commission aid'
- id: disaster_tax_revenue_collapse
  condition:
    weather_type:
    - floods
    - cyclone
    - earthquake
    - landslides
    severity:
    - severe
    - extreme
  propagation:
  - sector: Financial Services
    impact: -0.25
    lag_days: 60
    rationale: State GST collections decline; agriculture/trade/business disrupted
      → tax base shrinks
  - sector: Banks
    impact: -0.2
    lag_days: 90
    rationale: State government deposits shrink; borrowing costs rise; credit rating
      pressure
  - sector: Consumer Services
    impact: -0.3
    lag_days: 180
    rationale: 'Reduced government spending on welfare schemes; Himachal: 17% GST
      revenue loss'
  - sector: Realty
    impact: -0.2
    lag_days: 365
    rationale: Infrastructure projects delayed; state capex diverted to disaster recovery
  confidence: 0.88
  source: The Federal (Oct 2025); Outlook India (Nov 2025); IIT Bombay PVAR study
  evidence: 'Disaster-hit states lack GST compensation; HP lost ₹600 cr from GST rationalisation;
    Kerala: ₹8,000-10,000 cr annual shortfall'
- id: crop_insurance_claims_surge
  condition:
    weather_type:
    - drought
    - floods
    - cyclone
    - hailstorm
    - unseasonal rain
    crop_type:
    - any
    severity:
    - severe
    - extreme
  propagation:
  - sector: Financial Services
    impact: -0.35
    lag_days: 90
    rationale: ₹14,196 cr crop insurance claims in FY25; pending claims ₹1,425 cr;
      insurer margins compress
  - sector: Banks
    impact: -0.2
    lag_days: 180
    rationale: Farm loan defaults rise when insurance payouts delayed; AP has ₹859
      cr pending claims
  - sector: Agriculture & Allied
    impact: -0.15
    lag_days: 365
    rationale: Premium costs rise for next season; coverage may shrink; 622.5 lakh
      ha insured in FY25
  confidence: 0.89
  source: Ground Report (Feb 2026); MoA&FW Lok Sabha reply; LinkedIn/insurance sector
  evidence: Maharashtra ₹5,774 cr claims; Karnataka ₹2,809 cr; 2.79 cr farmer applications;
    13.12 lakh ha damaged
- id: supply_shock_storage_opportunity
  condition:
    weather_type:
    - drought
    - floods
    - cyclone
    - unseasonal rain
    crop_type:
    - onion
    - potato
    - tomato
    - pulses
    - apple
    - turmeric
    severity:
    - moderate
    - severe
  propagation:
  - sector: Consumer Services
    impact: 0.35
    lag_days: 14
